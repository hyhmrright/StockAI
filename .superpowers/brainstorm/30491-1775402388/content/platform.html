<h2>您希望构建哪种类型的应用程序？</h2>
<p class="subtitle">虽然底层都使用 TypeScript 和 Bun 进行数据抓取与 AI 分析，但最终呈现给用户的方式决定了我们的架构设计。</p>

<div class="options">
  <div class="option" data-choice="web" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Web 应用 (前后端全栈)</h3>
      <p>用户在浏览器中输入股票代码，网页展示图表、新闻列表和 AI 分析报告。最直观易用。</p>
    </div>
  </div>
  <div class="option" data-choice="cli" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>命令行工具 (CLI)</h3>
      <p>在终端中输入命令（如 <code>stock-ai AAPL</code>），在终端输出分析结果。适合开发者，速度最快。</p>
    </div>
  </div>
  <div class="option" data-choice="api" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>后端服务 (API Only)</h3>
      <p>仅提供 API 接口，供其他客户端（如手机 App 或第三方系统）调用。适合作为底层服务。</p>
    </div>
  </div>
</div>
