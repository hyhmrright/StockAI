name: "StockAI CI"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-24.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: bun install

      - name: Run frontend tests
        run: bunx vitest run

      - name: Run sidecar unit tests
        run: cd sidecar && bun test ai.test.ts strategies/parsers.test.ts

      - name: Build sidecar (unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          TARGET_TRIPLE=$(rustc -Vv | grep host | cut -d ' ' -f 2)
          bun build ./sidecar/index.ts --compile --outfile "./sidecar/stockai-backend-$TARGET_TRIPLE"

      - name: Build sidecar (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $triple = (rustc -Vv | Select-String "host:").ToString().Split(" ")[1]
          bun build ./sidecar/index.ts --compile --outfile "sidecar/stockai-backend-$triple.exe"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --no-bundle
