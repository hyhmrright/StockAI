name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: aarch64-apple-darwin
            bun-target: bun-darwin-arm64
            sidecar-name: stockai-backend-aarch64-apple-darwin

          - platform: ubuntu-24.04
            args: "--bundles deb"
            bun-target: bun-linux-x64
            sidecar-name: stockai-backend-x86_64-unknown-linux-gnu

          - platform: windows-latest
            bun-target: bun-windows-x64
            sidecar-name: stockai-backend-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install

      - name: Build sidecar binary
        shell: bash
        run: |
          bun build sidecar/index.ts \
            --compile \
            --target "${{ matrix.bun-target }}" \
            --outfile "sidecar/${{ matrix.sidecar-name }}"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "StockAI ${{ github.ref_name }}"
          releaseBody: |
            ## Installation

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` ending in `aarch64` |
            | Windows | `.msi` or `.exe` installer |
            | Linux | `.deb` package |

            > **macOS note:** If blocked by Gatekeeper, right-click the app and select Open.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
