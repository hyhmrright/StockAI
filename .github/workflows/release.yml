name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: aarch64-apple-darwin
            bun-target: bun-darwin-arm64
            sidecar-name: stockai-backend-aarch64-apple-darwin

          - platform: ubuntu-24.04
            args: "--bundles deb"
            bun-target: bun-linux-x64
            sidecar-name: stockai-backend-x86_64-unknown-linux-gnu

          - platform: windows-latest
            bun-target: bun-windows-x64
            sidecar-name: stockai-backend-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install

      - name: Import Apple Certificate
        if: matrix.platform == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build sidecar binary
        shell: bash
        env:
          BUN_TARGET: ${{ matrix.bun-target }}
          OUTFILE: src-tauri/bin/${{ matrix.sidecar-name }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          mkdir -p src-tauri/bin
          bun sidecar/build-script.ts
          # 根本性修复：清除所有可能导致 Damaged 错误的扩展属性
          xattr -cr src-tauri/bin/${{ matrix.sidecar-name }} || true

      - name: Verify Sidecar Integrity & Signature
        shell: bash
        run: |
          BINARY="src-tauri/bin/${{ matrix.sidecar-name }}"
          bun scripts/verify-bundle.ts "$BINARY"

      - name: Sidecar Self-Check
        shell: bash
        run: |
          BINARY="src-tauri/bin/${{ matrix.sidecar-name }}"
          echo "🚀 Running Sidecar Self-Check..."
          chmod +x "$BINARY"
          
          # 检查二进制依赖 (macOS)
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            echo "📚 Dependencies (otool -L):"
            otool -L "$BINARY"
          fi

          # 运行检查，如果失败则打印调试信息并退出
          if ! "$BINARY" --check; then
            echo "❌ CRITICAL: Sidecar self-check failed!"
            echo "💡 Debugging info:"
            ls -la src-tauri/bin/
            exit 1
          fi
          echo "✅ Sidecar self-check passed."

      - name: Check Signing Secrets
        shell: bash
        run: |
          SIGNING_READY=true
          if [ -z "${{ secrets.APPLE_CERTIFICATE }}" ]; then echo "⚠️ APPLE_CERTIFICATE missing"; SIGNING_READY=false; fi
          if [ -z "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ]; then echo "⚠️ APPLE_CERTIFICATE_PASSWORD missing"; SIGNING_READY=false; fi
          if [ -z "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then echo "⚠️ APPLE_SIGNING_IDENTITY missing"; SIGNING_READY=false; fi
          if [ -z "${{ secrets.APPLE_ID }}" ]; then echo "⚠️ APPLE_ID missing"; SIGNING_READY=false; fi
          if [ -z "${{ secrets.APPLE_PASSWORD }}" ]; then echo "⚠️ APPLE_PASSWORD missing"; SIGNING_READY=false; fi
          if [ -z "${{ secrets.APPLE_TEAM_ID }}" ]; then echo "⚠️ APPLE_TEAM_ID missing"; SIGNING_READY=false; fi
          
          if [ "$SIGNING_READY" = true ]; then
            echo "✅ All macOS signing secrets are present. Pipeline will attempt signing and notarization."
          else
            echo "❌ Signing secrets incomplete. macOS build will be unsigned and may be marked as 'damaged'."
          fi

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "StockAI ${{ github.ref_name }}"
          releaseBody: |
            See the [CHANGELOG](https://github.com/hyhmrright/StockAI/blob/main/CHANGELOG.md) for what's new in this release.

            ## Installation

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `.dmg` file ending in `aarch64` |
            | Windows | `.msi` (recommended) or `.exe` installer |
            | Linux (Ubuntu / Debian) | `.deb` package |

            ### Windows
            If SmartScreen warns you, click **More info → Run anyway**.

            ### Linux
            ```bash
            sudo dpkg -i StockAI_*_amd64.deb
            ```
            Requires WebKitGTK (pre-installed on most GTK-based desktop environments).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Verify Bundle Integrity (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          echo "🔍 Searching for generated DMG..."
          DMG_PATH=$(find src-tauri/target -name "StockAI_*_aarch64.dmg" | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            echo "❌ DMG not found in target directory!"
            ls -R src-tauri/target
            exit 1
          fi
          echo "✅ Found DMG: $DMG_PATH"

          echo "📂 Mounting DMG..."
          hdiutil attach "$DMG_PATH" -mountpoint /tmp/stockai_mnt

          echo "🔍 Verifying Gatekeeper status (spctl)..."
          spctl --assess --verbose /tmp/stockai_mnt/StockAI.app

          echo "🖋️ Checking App and Sidecar signature deep..."
          codesign -vvv --deep --strict /tmp/stockai_mnt/StockAI.app

          echo "🧪 Verifying Sidecar Entitlements..."
          # 寻找内部的 Sidecar
          SIDECAR_PATH=$(find /tmp/stockai_mnt/StockAI.app -name "stockai-backend*" | head -n 1)
          if [ -n "$SIDECAR_PATH" ]; then
            echo "✅ Found internal sidecar: $SIDECAR_PATH"
            codesign -d --entitlements :- "$SIDECAR_PATH" | grep "com.apple.security.cs.allow-jit"
          else
            echo "⚠️ Could not find internal sidecar to verify entitlements!"
          fi

          echo "📤 Detaching DMG..."
          hdiutil detach /tmp/stockai_mnt
          echo "✨ Bundle integrity verified successfully."
